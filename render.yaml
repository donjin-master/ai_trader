services:
  - type: web
    name: ai-trader-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: EXECUTION_MODE
        value: ADVISORY
      # Add the rest of your sensitive variables in the Render dashboard
      # e.g., DATABASE_URL, DELTA_API_KEY_PROD, ANTHROPIC_API_KEY, FRONTEND_URL, FRONTEND_API_SECRET
