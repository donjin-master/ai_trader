name: Keep Render backend alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            -H "x-api-secret: ${{ secrets.RENDER_API_SECRET }}" \
            https://ai-trader-dfn2.onrender.com/health
